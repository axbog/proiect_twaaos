<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar de sarcini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="navbar navbar-expand navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">Sarcini</a>
        
        <div class="d-flex align-items-center me-auto">
            <a class="nav-link text-white me-3" href="/">Acasă</a>
            <a class="nav-link text-white" href="/despre.html">Despre mine</a>
        </div>

        <div id="info-utilizator" class="d-none ms-auto align-items-center gap-3">
            <span id="contor-sarcini" class="badge bg-light text-dark border"></span>
            <span id="email-utilizator" class="text-white small d-none d-md-block"></span>
            <button class="btn btn-danger btn-sm fw-bold" onclick="deconecteaza()">Deconectare</button>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <div id="sectiune-auth">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div id="form-inregistrare" class="card mb-4">
                    <div class="card-body p-4">
                        <h4 class="card-title text-center text-primary mb-4">Înregistrare</h4>
                        <div id="eroare-inregistrare" class="alert alert-danger d-none"></div>
                        <div id="succes-inregistrare" class="alert alert-success d-none"></div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Email</label>
                            <input type="email" id="reg-email" class="form-control">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Parolă</label>
                            <input type="password" id="reg-parola" class="form-control">
                        </div>
                        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="inregistreaza()">Înregistrează-te</button>
                        <p class="text-center mt-3 mb-0 text-muted small">
                            Ai deja cont? <a href="#" class="text-decoration-none fw-bold" onclick="comutaFormular(); return false;">Autentifică-te</a>
                        </p>
                    </div>
                </div>

                <div id="form-autentificare" class="card d-none">
                    <div class="card-body p-4">
                        <h4 class="card-title text-center text-primary mb-4">Autentificare</h4>
                        <div id="eroare-autentificare" class="alert alert-danger d-none"></div>
                        <div class="mb-3">
                            <label class="form-label text-muted">Email</label>
                            <input type="email" id="auth-email" class="form-control">
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted">Parolă</label>
                            <input type="password" id="auth-parola" class="form-control">
                        </div>
                        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="autentifica()">Conectează-te</button>
                        <p class="text-center mt-3 mb-0 text-muted small">
                            Nu ai cont? <a href="#" class="text-decoration-none fw-bold" onclick="comutaFormular(); return false;">Înregistrează-te</a>
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="sectiune-sarcini" class="d-none row justify-content-center">
        <div class="col-md-8">
            
            <div class="card border-primary mb-5">
                <div class="card-body p-4">
                    <h5 class="card-title text-primary mb-3">Adaugă o sarcină nouă</h5>
                    <div class="mb-3">
                        <input type="text" id="sarcina-titlu" class="form-control" placeholder="Ce ai de făcut? (ex: Cumpărături)">
                    </div>
                    <div class="mb-3">
                        <textarea id="sarcina-descriere" class="form-control" placeholder="Detalii opționale..." rows="2"></textarea>
                    </div>
                    <button class="btn btn-success px-4" onclick="adaugaSarcina()">+ Adaugă Sarcina</button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-end mb-3">
                <h4 class="text-secondary mb-0">Sarcinile mele</h4>
            </div>
            
            <div class="d-flex flex-column flex-md-row gap-3 mb-4 bg-white p-3 rounded shadow-sm border">
                <div class="form-check mb-0 d-flex align-items-center">
                    <input class="form-check-input me-2" type="checkbox" id="doar-nefinalizate" onchange="incarcaSarcini()">
                    <label class="form-check-label text-muted" for="doar-nefinalizate">
                        Doar nefinalizate
                    </label>
                </div>
                <input type="text" id="cautare-sarcina" class="form-control form-control-sm w-auto flex-grow-1" 
                       placeholder="Caută o sarcină după titlu..." oninput="filtreazaSiRandeaza()">
            </div>

            <div id="lista-sarcini"></div>
            
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "";
    let cacheSarcini = [];

    function salveazaToken(token) { localStorage.setItem("token", token); }
    function obtineToken() { return localStorage.getItem("token"); }
    function deconecteaza() { localStorage.removeItem("token"); actualizeazaUI(); }

    function actualizeazaUI() {
        const token = obtineToken();
        if (token) {
            document.getElementById("sectiune-auth").classList.add("d-none");
            document.getElementById("sectiune-sarcini").classList.remove("d-none");
            document.getElementById("info-utilizator").classList.remove("d-none");
            document.getElementById("info-utilizator").classList.add("d-flex");
            try {
                const payload = JSON.parse(atob(token.split(".")[1]));
                document.getElementById("email-utilizator").textContent = payload.sub;
            } catch (e) { }
            incarcaSarcini();
        } else {
            document.getElementById("sectiune-auth").classList.remove("d-none");
            document.getElementById("sectiune-sarcini").classList.add("d-none");
            document.getElementById("info-utilizator").classList.add("d-none");
            document.getElementById("info-utilizator").classList.remove("d-flex");
        }
    }

    function comutaFormular() {
        document.getElementById("form-inregistrare").classList.toggle("d-none");
        document.getElementById("form-autentificare").classList.toggle("d-none");
    }

    async function inregistreaza() {
        ascundeEroare("eroare-inregistrare"); ascundeEroare("succes-inregistrare");
        const email = document.getElementById("reg-email").value;
        const parola = document.getElementById("reg-parola").value;
        try {
            const raspuns = await fetch(`${API}/inregistrare`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, parola })
            });
            if (!raspuns.ok) {
                const eroare = await raspuns.json();
                afiseazaEroare("eroare-inregistrare", eroare.detail || "Eroare la înregistrare.");
                return;
            }
            afiseazaSucces("succes-inregistrare", "Cont creat! Te poți autentifica.");
            setTimeout(comutaFormular, 1500);
        } catch { afiseazaEroare("eroare-inregistrare", "Eroare de rețea."); }
    }

    async function autentifica() {
        ascundeEroare("eroare-autentificare");
        const email = document.getElementById("auth-email").value;
        const parola = document.getElementById("auth-parola").value;
        const dateFormular = new URLSearchParams();
        dateFormular.append("username", email); dateFormular.append("password", parola);
        try {
            const raspuns = await fetch(`${API}/autentificare`, { method: "POST", body: dateFormular });
            if (!raspuns.ok) { afiseazaEroare("eroare-autentificare", "Email sau parolă incorecte."); return; }
            const date = await raspuns.json();
            salveazaToken(date.access_token);
            actualizeazaUI();
        } catch { afiseazaEroare("eroare-autentificare", "Eroare de rețea."); }
    }

    async function incarcaSarcini() {
        const token = obtineToken();
        const doarNefinalizate = document.getElementById("doar-nefinalizate").checked;
        const url = doarNefinalizate ? `${API}/sarcini?doar_nefinalizate=true` : `${API}/sarcini`;
        try {
            const raspuns = await fetch(url, { headers: { "Authorization": `Bearer ${token}` } });
            if (raspuns.status === 401) { deconecteaza(); return; }
            if (!raspuns.ok) return;
            cacheSarcini = await raspuns.json();
            filtreazaSiRandeaza();
        } catch {
            document.getElementById("lista-sarcini").innerHTML = `<div class="alert alert-warning">Eroare server.</div>`;
        }
    }

    function filtreazaSiRandeaza() {
        const termenCautare = document.getElementById("cautare-sarcina").value.toLowerCase();
        const sarciniFiltrate = cacheSarcini.filter(s => s.titlu.toLowerCase().includes(termenCautare));
        randeazaSarcini(sarciniFiltrate);
    }

    function randeazaSarcini(sarcini) {
        const container = document.getElementById("lista-sarcini");
        const total = cacheSarcini.length;
        const finalizate = cacheSarcini.filter(s => s.finalizata).length;
        document.getElementById("contor-sarcini").textContent = `${total} sarcini / ${finalizate} finalizate`;

        if (sarcini.length === 0) {
            container.innerHTML = `<div class="text-center text-muted mt-4">Nicio sarcină găsită.</div>`;
            return;
        }
        container.innerHTML = sarcini.map(s => `
            <div class="card border-0 shadow-sm mb-3" id="card-${s.id}">
                <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center" id="sarcina-body-${s.id}">
                    <div class="mb-3 mb-md-0">
                        <h6 class="mb-1 text-dark fw-bold">
                            ${escapeHtml(s.titlu)}
                            <span class="badge ${s.finalizata ? 'bg-success' : 'bg-warning text-dark'} ms-2">
                                ${s.finalizata ? 'Finalizată' : 'În progres'}
                            </span>
                        </h6>
                        <p class="text-muted small mb-0">${escapeHtml(s.descriere || '')}</p>
                    </div>
                    <div class="d-flex gap-2 flex-shrink-0">
                        <button class="btn btn-sm ${s.finalizata ? 'btn-outline-secondary' : 'btn-outline-success'}"
                            onclick="finalizeazaSarcina(${s.id})" title="Finalizează" ${s.finalizata ? 'disabled' : ''}>
                            ✓
                        </button>
                        <button class="btn btn-sm btn-outline-primary"
                            onclick="editeazaSarcina(${s.id})" title="Editează" ${s.finalizata ? 'disabled' : ''}>
                            ✎
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="stergeSarcina(${s.id})" title="Șterge">
                            ✕
                        </button>
                    </div>
                </div>
            </div>
        `).join("");
    }

    async function adaugaSarcina() {
        const titlu = document.getElementById("sarcina-titlu").value.trim();
        if (!titlu) return;
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify({ titlu, descriere: document.getElementById("sarcina-descriere").value.trim() })
            });
            if (raspuns.ok) {
                document.getElementById("sarcina-titlu").value = "";
                document.getElementById("sarcina-descriere").value = "";
                incarcaSarcini();
            }
        } catch { alert("Eroare la adăugare."); }
    }

    function editeazaSarcina(id) {
        const sarcina = cacheSarcini.find(s => s.id === id);
        const corpCard = document.getElementById(`sarcina-body-${id}`);
        corpCard.innerHTML = `
            <div class="w-100 me-md-3 mb-3 mb-md-0">
                <input type="text" id="edit-titlu-${id}" class="form-control mb-2 border-primary" value="${escapeHtml(sarcina.titlu)}">
                <textarea id="edit-descriere-${id}" class="form-control" rows="2">${escapeHtml(sarcina.descriere || '')}</textarea>
            </div>
            <div class="d-flex flex-column gap-2 flex-shrink-0">
                <button class="btn btn-sm btn-primary" onclick="salveazaEditare(${id})">Salvează</button>
                <button class="btn btn-sm btn-light border" onclick="filtreazaSiRandeaza()">Anulează</button>
            </div>
        `;
    }

    async function salveazaEditare(id) {
        const titlu = document.getElementById(`edit-titlu-${id}`).value.trim();
        const descriere = document.getElementById(`edit-descriere-${id}`).value.trim();
        if (!titlu) { alert("Titlul e obligatoriu!"); return; }
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${obtineToken()}` },
                body: JSON.stringify({ titlu, descriere })
            });
            if (raspuns.ok) incarcaSarcini();
        } catch { alert("Eroare la salvare."); }
    }

    async function finalizeazaSarcina(id) {
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}/finalizeaza`, {
                method: "PATCH", headers: { "Authorization": `Bearer ${obtineToken()}` }
            });
            if (raspuns.ok) incarcaSarcini();
        } catch { alert("Eroare la finalizare."); }
    }

    async function stergeSarcina(id) {
        if (!window.confirm("Ștergi această sarcină?")) return;
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}`, {
                method: "DELETE", headers: { "Authorization": `Bearer ${obtineToken()}` }
            });
            if (raspuns.ok) incarcaSarcini();
        } catch { alert("Eroare la ștergere."); }
    }

    function afiseazaEroare(id, msg) { document.getElementById(id).textContent = msg; document.getElementById(id).classList.remove("d-none"); }
    function afiseazaSucces(id, msg) { document.getElementById(id).textContent = msg; document.getElementById(id).classList.remove("d-none"); }
    function ascundeEroare(id) { document.getElementById(id).classList.add("d-none"); }
    function escapeHtml(t) { const d = document.createElement("div"); d.textContent = String(t); return d.innerHTML; }

    document.addEventListener("DOMContentLoaded", actualizeazaUI);
</script>
</body>
</html>
