<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarcinile mele</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="navbar navbar-expand navbar-dark bg-dark shadow-sm">
    <div class="container">
        <div class="d-flex align-items-center me-auto">
            <a class="nav-link text-white me-3" href="/acasa.html">Acasă</a>
            <a class="nav-link text-white me-3 fw-bold" href="/sarcini.html">Sarcini</a>
            <a class="nav-link text-white" href="/despre.html">Despre mine</a>
        </div>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span id="contor-sarcini" class="badge bg-light text-dark border"></span>
            <button class="btn btn-danger btn-sm fw-bold" onclick="deconecteaza()">Deconectare</button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-primary mb-5">
                <div class="card-body p-4">
                    <h5 class="card-title text-primary mb-3">Adaugă o sarcină nouă</h5>
                    <div class="mb-3"><input type="text" id="sarcina-titlu" class="form-control" placeholder="Titlu"></div>
                    <div class="mb-3"><textarea id="sarcina-descriere" class="form-control" placeholder="Descriere..." rows="2"></textarea></div>
                    <button class="btn btn-success px-4" onclick="adaugaSarcina()">+ Adaugă</button>
                </div>
            </div>

            <h4 class="text-secondary mb-3">Sarcinile mele</h4>
            
            <div class="card p-3 mb-4 shadow-sm border-0">
                <div class="d-flex gap-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="doar-nefinalizate" onchange="incarcaSarcini()">
                        <label class="form-check-label text-muted" for="doar-nefinalizate">Doar nefinalizate</label>
                    </div>
                    <input type="text" id="cautare-titlu" class="form-control form-control-sm w-50" placeholder="Caută după titlu..." oninput="filtreazaLocal()">
                </div>
            </div>

            <div id="lista-sarcini"></div>
        </div>
    </div>
</div>

<script>
    const API = "";
    let listaCurenta = []; // Pentru filtrarea locală

    document.addEventListener("DOMContentLoaded", () => {
        if (!localStorage.getItem("token")) {
            window.location.href = "/";
        } else {
            incarcaSarcini();
        }
    });

    function deconecteaza() {
        localStorage.removeItem("token");
        window.location.href = "/";
    }

    async function incarcaSarcini() {
        const token = localStorage.getItem("token");
        const doarNefinalizate = document.getElementById("doar-nefinalizate").checked;
        const url = doarNefinalizate ? `${API}/sarcini?doar_nefinalizate=true` : `${API}/sarcini`;
        
        try {
            const raspuns = await fetch(url, { headers: { "Authorization": `Bearer ${token}` } });
            if (raspuns.status === 401) return deconecteaza();
            listaCurenta = await raspuns.json();
            randeazaSarcini(listaCurenta);
        } catch { alert("Eroare de conexiune."); }
    }

    function filtreazaLocal() {
        const query = document.getElementById("cautare-titlu").value.toLowerCase();
        const filtrate = listaCurenta.filter(s => s.titlu.toLowerCase().includes(query));
        randeazaSarcini(filtrate);
    }

    function randeazaSarcini(sarcini) {
        const finalizate = sarcini.filter(s => s.finalizata).length;
        document.getElementById("contor-sarcini").textContent = `${sarcini.length} sarcini / ${finalizate} finalizate`;
        
        const container = document.getElementById("lista-sarcini");
        if (sarcini.length === 0) {
            container.innerHTML = `<div class="text-muted">Nu ai sarcini adăugate.</div>`;
            return;
        }
        container.innerHTML = sarcini.map(s => `
            <div class="card border-0 shadow-sm mb-3" id="card-${s.id}">
                <div class="card-body">
                    <div id="view-${s.id}">
                        <h6 class="${s.finalizata ? 'text-decoration-line-through text-muted' : 'text-dark fw-bold'}">${s.titlu}</h6>
                        <p class="text-muted small mb-2">${s.descriere || ''}</p>
                        <button class="btn btn-sm btn-outline-primary" onclick="pornesteEditare(${s.id})">Editează</button>
                        <button class="btn btn-sm btn-outline-success" onclick="finalizeazaSarcina(${s.id})" ${s.finalizata ? 'disabled' : ''}>✓</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="stergeSarcina(${s.id})">✕</button>
                    </div>
                    <div id="edit-${s.id}" class="d-none">
                        <input type="text" id="edit-titlu-${s.id}" class="form-control mb-2" value="${s.titlu}">
                        <textarea id="edit-desc-${s.id}" class="form-control mb-2">${s.descriere || ''}</textarea>
                        <button class="btn btn-sm btn-primary" onclick="salveazaEditare(${s.id})">Salvează</button>
                    </div>
                </div>
            </div>
        `).join("");
    }

    function pornesteEditare(id) {
        document.getElementById(`view-${id}`).classList.add('d-none');
        document.getElementById(`edit-${id}`).classList.remove('d-none');
    }

    async function salveazaEditare(id) {
        const titlu = document.getElementById(`edit-titlu-${id}`).value;
        const descriere = document.getElementById(`edit-desc-${id}`).value;
        await fetch(`${API}/sarcini/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem("token")}` },
            body: JSON.stringify({ titlu, descriere })
        });
        incarcaSarcini();
    }

    async function stergeSarcina(id) {
        if (confirm("Ești sigur că vrei să ștergi această sarcină?")) {
            await fetch(`${API}/sarcini/${id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }});
            incarcaSarcini();
        }
    }

    async function adaugaSarcina() {
        const titlu = document.getElementById("sarcina-titlu").value;
        const descriere = document.getElementById("sarcina-descriere").value;
        if (!titlu) return;
        await fetch(`${API}/sarcini`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${localStorage.getItem("token")}` },
            body: JSON.stringify({ titlu, descriere })
        });
        document.getElementById("sarcina-titlu").value = "";
        document.getElementById("sarcina-descriere").value = "";
        incarcaSarcini();
    }

    async function finalizeazaSarcina(id) {
        await fetch(`${API}/sarcini/${id}/finalizeaza`, { method: "PATCH", headers: { "Authorization": `Bearer ${localStorage.getItem("token")}` }});
        incarcaSarcini();
    }
</script>
</body>
</html>
