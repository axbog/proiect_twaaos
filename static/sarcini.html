<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Sarcini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/acasa.html">Proiect</a>
        <div class="d-flex align-items-center me-auto">
            <a class="nav-link text-white me-3" href="/acasa.html">Acasă</a>
            <a class="nav-link text-white me-3 fw-bold" href="/sarcini.html">Sarcini</a>
            <a class="nav-link text-white" href="/despre.html">Despre mine</a>
        </div>
        <div class="ms-auto"><button id="btn-deconectare" class="btn btn-danger btn-sm" onclick="deconecteaza()">Deconectare</button></div>
    </div>
</nav>

<div class="container mt-5">
    <div id="sectiune-auth">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm">
                    <h4 class="text-primary text-center">Autentificare</h4>
                    <div id="eroare-autentificare" class="alert alert-danger d-none"></div>
                    <input type="email" id="auth-email" class="form-control mb-3" placeholder="Email">
                    <input type="password" id="auth-parola" class="form-control mb-3" placeholder="Parolă">
                    <button class="btn btn-primary w-100" onclick="autentifica()">Conectează-te</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sectiune-sarcini" class="d-none">
        <h4 class="text-secondary mb-3">Sarcinile mele</h4>
        
        <div class="card p-3 mb-4 shadow-sm border-0">
            <div class="row g-3">
                <div class="col-md-6">
                    <input type="text" id="search-input" class="form-control" placeholder="Caută..." oninput="proceseazaSarcini()">
                </div>
                <div class="col-md-6">
                    <select id="sort-select" class="form-select" onchange="proceseazaSarcini()">
                        <option value="default">Sortare implicită</option>
                        <option value="titlu">Titlu (A-Z)</option>
                        <option value="stare">Finalizate la final</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="lista-sarcini"></div>
    </div>
</div>

<script>
    const API = "";
    let sarciniCache = [];

    async function incarcaSarcini() {
        const token = localStorage.getItem("token");
        const resp = await fetch(`${API}/sarcini`, { headers: { "Authorization": `Bearer ${token}` } });
        if (resp.ok) {
            sarciniCache = await resp.json();
            proceseazaSarcini();
        }
    }

    function proceseazaSarcini() {
        let lista = [...sarciniCache];
        const search = document.getElementById("search-input").value.toLowerCase();
        const sort = document.getElementById("sort-select").value;

        // Filtrare
        lista = lista.filter(s => s.titlu.toLowerCase().includes(search));

        // Sortare
        if (sort === "titlu") lista.sort((a, b) => a.titlu.localeCompare(b.titlu));
        if (sort === "stare") lista.sort((a, b) => a.finalizata - b.finalizata);

        randeazaSarcini(lista);
    }

    function randeazaSarcini(lista) {
        const container = document.getElementById("lista-sarcini");
        container.innerHTML = lista.map(s => `
            <div class="card mb-2 shadow-sm border-0">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <span class="${s.finalizata ? 'text-decoration-line-through text-muted' : ''}">${s.titlu}</span>
                    <button class="btn btn-sm btn-outline-success" onclick="finalizeaza(${s.id})" ${s.finalizata ? 'disabled' : ''}>✓</button>
                </div>
            </div>
        `).join("");
    }

    // Funcții autentificare/deconectare păstrate aici...
    // [Se adaugă funcțiile tale autentifica, deconecteaza, finalizeaza, etc.]
</script>
</body>
</html>
